services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: papercompany
      POSTGRES_PASSWORD: papercompany
      POSTGRES_DB: papercompany_stable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papercompany -d papercompany_stable"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://papercompany:papercompany@db:5432/papercompany_stable
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - papercompany-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  papercompany-data:
